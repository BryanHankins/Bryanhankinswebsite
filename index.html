<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=https://bryanhankins.github.io/">
<link rel="canonical" href="https://bryanhankins.github.io/">
<title>Bryan Hankins — Redirecting...</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #f0ede8;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }
  .wrap { padding: 2rem; }
  p { color: #888880; font-size: 0.95rem; margin-bottom: 1.5rem; }
  a {
    font-family: monospace;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: #e8d5a3;
    color: #0a0a0a;
    padding: 0.75rem 1.75rem;
    border-radius: 2px;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <p>This page has moved. Taking you there now...</p>
  <a href="https://bryanhankins.github.io/">Go to new site</a>
</div>
<script>
  window.location.replace("https://bryanhankins.github.io/");
</script>
</body>
</html>
